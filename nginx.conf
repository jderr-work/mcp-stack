worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Shared SSE-safe proxy settings
    proxy_http_version  1.1;
    proxy_buffering     off;
    proxy_cache         off;
    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    # Required for SSE: clear Connection header so upstream can use keep-alive
    proxy_set_header    Connection        '';
    gzip                off;

    server {
        listen 9000;
        server_name localhost;

        # ---------------------------------------------------------------------------
        # GitHub MCP server — native streamable HTTP
        # Endpoint: /mcp  (streamable HTTP)
        # Auth: pass Authorization header through from client
        # ---------------------------------------------------------------------------
        location /github-official/ {
            proxy_pass http://github-official:8082/;
        }

        # ---------------------------------------------------------------------------
        # Atlassian MCP server — native SSE transport
        # Endpoint: /sse  (SSE)
        # ---------------------------------------------------------------------------
        location /atlassian/ {
            proxy_pass http://atlassian:8000/;
        }

        # ---------------------------------------------------------------------------
        # fetch — mcp-proxy wrapping mcp-server-fetch
        # Endpoints: /mcp (streamable HTTP), /sse (SSE)
        # ---------------------------------------------------------------------------
        location /fetch/ {
            proxy_pass http://mcp-fetch:8001/;
        }

        # ---------------------------------------------------------------------------
        # duckduckgo — mcp-proxy wrapping duckduckgo-mcp-server
        # ---------------------------------------------------------------------------
        location /duckduckgo/ {
            proxy_pass http://mcp-duckduckgo:8002/;
        }

        # ---------------------------------------------------------------------------
        # playwright — mcp-proxy wrapping @playwright/mcp
        # ---------------------------------------------------------------------------
        location /playwright/ {
            proxy_pass http://mcp-playwright:8003/;
        }

        # Health check endpoint
        location /health {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }
    }
}
